name: Build Unsigned IPA

on: push

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Run pod install
        run: |
          cd ios
          pod install
          cd ..

      - name: Set deployment target to 14.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build unsigned .app
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          IPA_NAME="LuchiKwacha-unsigned.ipa"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r "$IPA_NAME" Payload
          echo "Unsigned IPA created: $IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuchiKwacha-Unsigned-IPA
          path: LuchiKwacha-unsigned.ipa