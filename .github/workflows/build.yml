name: iOS Simulator Live VNC

on: push

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      - name: Build simulator .app
        run: |
          flutter pub get
          flutter build ios --debug --simulator

      - name: Install tools
        run: |
          brew install tigervnc bore-cli
          nohup Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2

      - name: Boot Simulator & Launch App
        run: |
          export DISPLAY=:99
          SIMULATOR_LINE=$(xcrun simctl list devices available \
            | grep -E "iPhone [0-9]+" \
            | head -1)
          if [ -z "$SIMULATOR_LINE" ]; then
            echo "No iPhone simulator found"
            exit 1
          fi
          UDID=$(echo "$SIMULATOR_LINE" \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          DEVICE_NAME=$(echo "$SIMULATOR_LINE" | sed 's/ (.*//')
          echo "Using $DEVICE_NAME ($UDID)"
          xcrun simctl boot "$UDID" || true
          sleep 15
          APP_PATH="build/ios/Debug-iphonesimulator/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            exit 1
          fi
          xcrun simctl install "$UDID" "$APP_PATH"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID="com.example.vaultlend"
          fi
          xcrun simctl launch "$UDID" "$BUNDLE_ID"

            # --- Start and configure macOS VNC with legacy password ---
      - name: Configure and Start macOS VNC Server
        run: |
          # 1. Allow all users with full privileges
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all

          # 2. Enable legacy VNC mode (required by Remmina & TigerVNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes

          # 3. Set a VNC password (choose anything, e.g. 'VaultLend2024')
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw VaultLend2024

          # 4. Restart the ARD agent to apply changes
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -restart -agent -console

      - name: Expose VNC via bore
        run: |
          bore local 5900 --to bore.pub > bore.log 2>&1 &

          # Wait until bore prints its public URL
          for i in $(seq 1 12); do
            if grep -q "bore.pub:" bore.log; then
              break
            fi
            sleep 5
          done

          BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' bore.log | head -1)
          if [ -z "$BORE_URL" ]; then
            echo "Bore did not start. Log:"
            cat bore.log
            exit 1
          fi

          echo "────────────────────────────────────────────────────"
          echo "🔗 Use this address in a VNC viewer:"
          echo "$BORE_URL"
          echo "────────────────────────────────────────────────────"

          # Print it again every 30 seconds so you don't miss it
          while true; do
            sleep 30
            echo "🔗 Current VNC address: $BORE_URL"
          done