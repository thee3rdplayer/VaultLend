# ─── Workflow name ─────────────────────────────────────────────
name: iOS Simulator Live VNC

# ─── Trigger ──────────────────────────────────────────────────
on: push

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      # 1. Build the iOS Simulator app (unsigned, no signing needed)
      - name: Build simulator .app
        run: |
          flutter pub get
          flutter build ios --debug --simulator

      # 2. Install needed tools (ngrok, virtual display, VNC server)
      - name: Install tools
        run: |
          brew install --cask ngrok
          brew install tigervnc
          # Start a virtual display (required for Simulator on headless runner)
          nohup Xvfb :99 -screen 0 1280x1024x24 &

      # 3. Start iOS Simulator in background
      - name: Boot Simulator
        run: |
          export DISPLAY=:99
          # List available simulators
          xcrun simctl list devices
          # Boot the first available iPhone simulator (e.g., iPhone 15)
          UDID=$(xcrun simctl list devices | grep "iPhone 15" | head -1 | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          if [ -z "$UDID" ]; then
            # fallback: just use a known device type
            UDID=$(xcrun simctl create "VaultLendTest" "iPhone 15" "com.apple.CoreSimulator.SimRuntime.iOS-17-5")
          fi
          xcrun simctl boot "$UDID"
          # Wait for simulator to boot
          sleep 15
          # Install the app
          xcrun simctl install "$UDID" build/ios/Debug-iphonesimulator/Runner.app
          # Launch the app
          xcrun simctl launch "$UDID" com.example.vaultlend

      # 4. Start VNC server sharing the virtual display
      - name: Start VNC server
        run: |
          export DISPLAY=:99
          vncserver :99 -localhost no -SecurityTypes None -geometry 1280x1024 -depth 24 &
          sleep 5

      # 5. Create ngrok tunnel to expose VNC port (5900)
      - name: Expose VNC via ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok tcp 5900 --log=stdout > /dev/null &
          sleep 3
          # Get the public URL
          VNC_URL=$(curl -s localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "────────────────────────────────────────────────────"
          echo "🔗 Use this VNC address with a VNC viewer:"
          echo "$VNC_URL"
          echo "────────────────────────────────────────────────────"
          # Also output a web-based VNC link using noVNC (optional)
          echo "Or open this link in your browser:"
          echo "https://novnc.com/noVNC/vnc.html?host=$(echo $VNC_URL | sed 's/tcp:\/\///')"
          # Keep the tunnel alive while you interact
          sleep 3600   # 1 hour max (free GitHub runner limit)