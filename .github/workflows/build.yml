      # 3. Boot the first available iPhone simulator, install & launch VaultLend
      - name: Boot Simulator & Launch App
        run: |
          export DISPLAY=:99

          # --- Find a usable iPhone device (avoid watches, TVs, iPads) ---
          SIMULATOR_LINE=$(xcrun simctl list devices available \
            | grep -E "iPhone [0-9]+" \
            | head -1)
          if [ -z "$SIMULATOR_LINE" ]; then
            echo " No iPhone simulator found"
            exit 1
          fi

          # Extract the UUID (the string inside parentheses)
          UDID=$(echo "$SIMULATOR_LINE" \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          DEVICE_NAME=$(echo "$SIMULATOR_LINE" | sed 's/ (.*//')

          echo " Using device: $DEVICE_NAME ($UDID)"

          # --- Boot the simulator ---
          xcrun simctl boot "$UDID" || true   # don't fail if already booted
          sleep 15   # give it time to finish booting

          # --- Install the Flutter app ---
          APP_PATH="build/ios/Debug-iphonesimulator/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo " App not found at $APP_PATH"
            exit 1
          fi
          xcrun simctl install "$UDID" "$APP_PATH"

          # --- Read the app bundle identifier from its Info.plist ---
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID="com.example.vaultlend"   # fallback
          fi
          echo " Bundle ID: $BUNDLE_ID"

          # --- Launch the app ---
          xcrun simctl launch "$UDID" "$BUNDLE_ID"