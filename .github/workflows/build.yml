name: iOS Simulator Live VNC

on: push

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      # 1. Build the iOS Simulator app
      - name: Build simulator .app
        run: |
          flutter pub get
          flutter build ios --debug --simulator

      # 2. Install tools (VNC server, virtual display, bore, websockify via venv)
      - name: Install tools
        run: |
          brew install tigervnc bore-cli
          # Create a Python virtual environment so pip is allowed
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install websockify
          nohup Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2

      # 3. Boot Simulator & launch app
      - name: Boot Simulator & Launch App
        run: |
          export DISPLAY=:99

          # Find a usable iPhone simulator (any model)
          SIMULATOR_LINE=$(xcrun simctl list devices available \
            | grep -E "iPhone [0-9]+" \
            | head -1)
          if [ -z "$SIMULATOR_LINE" ]; then
            echo "No iPhone simulator found"
            exit 1
          fi

          UDID=$(echo "$SIMULATOR_LINE" \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          DEVICE_NAME=$(echo "$SIMULATOR_LINE" | sed 's/ (.*//')
          echo "Using $DEVICE_NAME ($UDID)"

          xcrun simctl boot "$UDID" || true
          sleep 15

          APP_PATH="build/ios/Debug-iphonesimulator/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            exit 1
          fi
          xcrun simctl install "$UDID" "$APP_PATH"

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID="com.example.vaultlend"
          fi
          echo "Bundle ID: $BUNDLE_ID"

          xcrun simctl launch "$UDID" "$BUNDLE_ID"

      # 4. Start VNC server
      - name: Start VNC server
        run: |
          export DISPLAY=:99
          vncserver :99 -localhost no -SecurityTypes None -geometry 1280x1024 -depth 24 &
          sleep 5

      # 5. Bridge VNC to WebSocket + expose via bore
      - name: Expose VNC via bore (WebSocket)
        run: |
          # Activate venv to access websockify
          source ~/venv/bin/activate

          # Convert VNC (TCP 5900) to WebSocket on port 6080
          websockify 6080 localhost:5900 &
          sleep 2

          # Start bore tunnel for port 6080
          bore local 6080 --to bore.pub > bore.log 2>&1 &
          sleep 4

          # Extract the public hostname assigned by bore
          BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' bore.log | head -1)
          if [ -z "$BORE_URL" ]; then
            echo "Could not retrieve bore URL"
            cat bore.log
            exit 1
          fi

          HOST=$(echo "$BORE_URL" | cut -d: -f1)
          PORT=$(echo "$BORE_URL" | cut -d: -f2)

          echo "────────────────────────────────────────────────────"
          echo "🔗 Open this link in your browser to test the app:"
          echo "https://novnc.com/noVNC/vnc.html?host=$HOST&port=$PORT&path=/websockify"
          echo "────────────────────────────────────────────────────"

          # Keep alive for up to 1 hour
          sleep 3600